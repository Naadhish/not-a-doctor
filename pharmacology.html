<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pharmacology Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c14;--surface:#0e1420;--surface2:#141c2e;
  --border:rgba(255,255,255,0.07);--accent:#00e5b0;--accent2:#0090ff;
  --danger:#ff4d6d;--text:#e8edf5;--muted:#6b7a99;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',Helvetica,Arial,sans-serif;
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    -webkit-radial-gradient(20% 10% ellipse,rgba(0,144,255,.06) 0%,transparent 60%),
    -webkit-radial-gradient(80% 90% ellipse,rgba(0,229,176,.05) 0%,transparent 60%);
  background:
    radial-gradient(ellipse at 20% 10%,rgba(0,144,255,.06) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 90%,rgba(0,229,176,.05) 0%,transparent 60%);
}
.wrapper{
  position:relative;z-index:1;
  min-height:100vh;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-align:center;-webkit-align-items:center;align-items:center;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
  padding:24px 16px;
  padding-bottom:calc(24px + env(safe-area-inset-bottom));
}
.screen{display:none;width:100%;max-width:720px;}
.screen.active{
  display:block;
  -webkit-animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both;
  animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both;
}
@-webkit-keyframes fadeUp{from{opacity:0;-webkit-transform:translateY(20px);transform:translateY(20px)}to{opacity:1;-webkit-transform:translateY(0);transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@-webkit-keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
@-webkit-keyframes pop{0%,100%{-webkit-transform:scale(1);transform:scale(1)}40%{-webkit-transform:scale(1.015);transform:scale(1.015)}}
@keyframes pop{0%,100%{transform:scale(1)}40%{transform:scale(1.015)}}
@-webkit-keyframes shake{0%,100%{-webkit-transform:translateX(0)}25%{-webkit-transform:translateX(-5px)}75%{-webkit-transform:translateX(5px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ── START ── */
.start-hero{text-align:center;padding:52px 20px 48px;}
.pill{
  display:-webkit-inline-flex;display:inline-flex;
  -webkit-align-items:center;align-items:center;gap:8px;
  background:rgba(0,229,176,.08);border:1px solid rgba(0,229,176,.2);
  color:var(--accent);font-size:11px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  padding:6px 16px;border-radius:100px;margin-bottom:26px;
}
.pill-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);
  -webkit-animation:blink 2s infinite;animation:blink 2s infinite;display:inline-block;}
h1{
  font-family:'Syne',Helvetica,sans-serif;
  font-size:clamp(1.9rem,7vw,3.3rem);
  font-weight:800;line-height:1.05;letter-spacing:-.02em;margin-bottom:14px;
  background:-webkit-linear-gradient(135deg,#fff 30%,rgba(0,229,176,.8));
  background:linear-gradient(135deg,#fff 30%,rgba(0,229,176,.8));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;color:#fff;/* fallback */
}
.start-p{color:var(--muted);font-size:.98rem;line-height:1.65;max-width:450px;margin:0 auto 34px;}
.stats-row{
  display:-webkit-flex;display:flex;
  -webkit-justify-content:center;justify-content:center;
  gap:10px;margin-bottom:32px;-webkit-flex-wrap:wrap;flex-wrap:wrap;
}
.stat-chip{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px 20px;text-align:center;min-width:110px;
}
.stat-val{font-family:'Syne',Helvetica,sans-serif;font-size:1.7rem;font-weight:700;color:var(--accent);line-height:1;}
.stat-lbl{font-size:.68rem;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-top:4px;}
.tog-row{
  display:-webkit-flex;display:flex;
  -webkit-justify-content:center;justify-content:center;
  gap:10px;margin-bottom:28px;-webkit-flex-wrap:wrap;flex-wrap:wrap;
}
.tog{
  background:var(--surface);border:1px solid var(--border);
  color:var(--muted);font-family:'DM Sans',Helvetica,sans-serif;
  font-size:.85rem;padding:11px 18px;border-radius:100px;
  cursor:pointer;-webkit-appearance:none;appearance:none;
  min-height:44px;min-width:44px;
  -webkit-transition:background .2s,border-color .2s,color .2s;
  transition:background .2s,border-color .2s,color .2s;
  font-weight:500;
}
.tog.on{background:rgba(0,229,176,.1);border-color:rgba(0,229,176,.35);color:var(--accent);}
.btn-primary{
  background:var(--accent);color:#000;
  font-family:'Syne',Helvetica,sans-serif;font-weight:700;font-size:1rem;
  letter-spacing:.03em;padding:16px 42px;border-radius:100px;
  border:none;cursor:pointer;
  -webkit-appearance:none;appearance:none;
  min-height:54px;min-width:160px;
  -webkit-transition:-webkit-transform .2s,box-shadow .2s;
  transition:transform .2s,box-shadow .2s;
  display:inline-block;
}

/* ── QUIZ ── */
.quiz-hdr{
  display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  gap:12px;margin-bottom:18px;
}
.q-counter{font-family:'Syne',Helvetica,sans-serif;font-size:.8rem;font-weight:600;color:var(--muted);white-space:nowrap;}
.q-counter strong{color:var(--text);}
.prog-wrap{-webkit-flex:1;flex:1;height:4px;background:var(--surface2);border-radius:100px;overflow:hidden;}
.prog-fill{
  height:100%;
  background:-webkit-linear-gradient(left,var(--accent2),var(--accent));
  background:linear-gradient(90deg,var(--accent2),var(--accent));
  border-radius:100px;
  -webkit-transition:width .5s cubic-bezier(.22,1,.36,1);
  transition:width .5s cubic-bezier(.22,1,.36,1);
}
.timer-chip{
  display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;gap:6px;
  font-family:'Syne',Helvetica,sans-serif;font-size:.8rem;font-weight:600;
  color:var(--muted);white-space:nowrap;
}
.t-dot{
  width:6px;height:6px;border-radius:50%;background:var(--accent);
  display:inline-block;
  -webkit-animation:blink 1.5s infinite;animation:blink 1.5s infinite;
}
.q-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:26px 22px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.q-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:-webkit-linear-gradient(left,var(--accent2),var(--accent));
  background:linear-gradient(90deg,var(--accent2),var(--accent));
}
.q-num{font-family:'Syne',Helvetica,sans-serif;font-size:.7rem;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.q-text{font-size:1.02rem;line-height:1.65;color:var(--text);}
.opts-list{
  display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;gap:9px;
}
.opt{
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:14px;padding:13px 16px;
  text-align:left;cursor:pointer;
  display:-webkit-flex;display:flex;
  -webkit-align-items:flex-start;align-items:flex-start;gap:12px;
  -webkit-transition:border-color .18s,background .18s;
  transition:border-color .18s,background .18s;
  font-family:'DM Sans',Helvetica,sans-serif;
  font-size:.9rem;line-height:1.5;color:var(--text);
  width:100%;-webkit-appearance:none;appearance:none;
  min-height:50px;
}
.opt-ltr{
  -webkit-flex-shrink:0;flex-shrink:0;
  width:26px;height:26px;border-radius:7px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
  font-family:'Syne',Helvetica,sans-serif;
  font-size:.7rem;font-weight:700;color:var(--muted);
  margin-top:1px;
  -webkit-transition:background .18s,border-color .18s,color .18s;
  transition:background .18s,border-color .18s,color .18s;
}
.opt:disabled{cursor:default;}
.opt.correct{
  border-color:rgba(0,229,176,.6);background:rgba(0,229,176,.08);
  -webkit-animation:pop .35s ease;animation:pop .35s ease;
}
.opt.correct .opt-ltr{background:rgba(0,229,176,.2);border-color:var(--accent);color:var(--accent);}
.opt.wrong{
  border-color:rgba(255,77,109,.5);background:rgba(255,77,109,.06);
  -webkit-animation:shake .35s ease;animation:shake .35s ease;
}
.opt.wrong .opt-ltr{background:rgba(255,77,109,.15);border-color:var(--danger);color:var(--danger);}
.opt.dim{opacity:.3;}
.fb{
  border-radius:12px;padding:12px 16px;font-size:.87rem;font-weight:500;margin-bottom:12px;
  display:none;
  -webkit-align-items:flex-start;align-items:flex-start;gap:10px;
  -webkit-animation:fadeUp .3s ease both;animation:fadeUp .3s ease both;
}
.fb.show{display:-webkit-flex;display:flex;}
.fb.ok{background:rgba(0,229,176,.1);border:1px solid rgba(0,229,176,.25);color:var(--accent);}
.fb.ko{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.25);color:#ff8fa3;}
.fb-icon{font-weight:700;-webkit-flex-shrink:0;flex-shrink:0;font-style:normal;}
.btn-next{
  background:-webkit-linear-gradient(135deg,var(--accent2),var(--accent));
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#000;font-family:'Syne',Helvetica,sans-serif;font-weight:700;
  font-size:.87rem;letter-spacing:.04em;
  padding:14px 30px;border-radius:100px;border:none;cursor:pointer;
  display:none;float:right;margin-top:6px;
  -webkit-appearance:none;appearance:none;min-height:48px;
  -webkit-transition:-webkit-transform .2s,box-shadow .2s;
  transition:transform .2s,box-shadow .2s;
}
.btn-next.show{
  display:inline-block;
  -webkit-animation:fadeUp .3s ease both;animation:fadeUp .3s ease both;
}
.cf::after{content:'';display:table;clear:both;}
.qc{-webkit-transition:opacity .16s ease;transition:opacity .16s ease;}
.qc.out{opacity:0;}

/* ── RESULTS ── */
.result-wrap{text-align:center;padding:12px 0;}
.ring-box{position:relative;display:inline-block;margin-bottom:0;}
.ring-box svg{display:block;}
.pct-overlay{
  position:absolute;inset:0;
  display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
}
.pct-n{font-family:'Syne',Helvetica,sans-serif;font-size:2.3rem;font-weight:800;line-height:1;color:var(--text);}
.pct-s{font-size:.68rem;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-top:2px;}
.res-title{font-family:'Syne',Helvetica,sans-serif;font-size:1.6rem;font-weight:700;margin:18px 0 6px;letter-spacing:-.01em;}
.res-sub{color:var(--muted);font-size:.9rem;margin-bottom:28px;}
.res-grid{
  display:-webkit-flex;display:flex;
  gap:10px;margin-bottom:28px;
  -webkit-justify-content:center;justify-content:center;
}
.res-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:18px 12px;text-align:center;
  -webkit-flex:1;flex:1;min-width:90px;
}
.res-val{font-family:'Syne',Helvetica,sans-serif;font-size:1.8rem;font-weight:700;line-height:1;}
.res-lbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:5px;}
.res-actions{
  display:-webkit-flex;display:flex;gap:10px;
  -webkit-justify-content:center;justify-content:center;
  -webkit-flex-wrap:wrap;flex-wrap:wrap;
}
.btn-outline{
  background:transparent;border:1.5px solid var(--border);color:var(--text);
  font-family:'DM Sans',Helvetica,sans-serif;font-weight:500;font-size:.88rem;
  padding:13px 24px;border-radius:100px;cursor:pointer;
  -webkit-appearance:none;appearance:none;min-height:48px;
  -webkit-transition:border-color .2s,background .2s;
  transition:border-color .2s,background .2s;
}
@media(max-width:420px){
  .q-card{padding:20px 14px;}
  .q-text{font-size:.95rem;}
  .opt{padding:11px 12px;font-size:.86rem;}
  .res-val{font-size:1.5rem;}
  .start-hero{padding:40px 10px 36px;}
  h1{font-size:1.85rem;}
}
</style>
</head>
<body>
<div class="wrapper">

  <!-- START -->
  <div id="sStart" class="screen active">
    <div class="start-hero">
      <div class="pill"><span class="pill-dot"></span>Medical Sciences</div>
      <h1>Pharmacology<br>Practice Quiz</h1>
      <p class="start-p">Master pharmacokinetics, drug mechanisms, clinical pharmacology, and antimicrobial agents — all exam questions in one place.</p>
      <div class="stats-row">
        <div class="stat-chip"><div class="stat-val" id="totalN">220</div><div class="stat-lbl">Questions</div></div>
        <div class="stat-chip"><div class="stat-val">5</div><div class="stat-lbl">Choices Each</div></div>
        <div class="stat-chip"><div class="stat-val">&#8734;</div><div class="stat-lbl">Attempts</div></div>
      </div>
      <div class="tog-row">
        <button class="tog on" id="btnShuffle" type="button">&#128256; Shuffle</button>
        <button class="tog" id="btnReview" type="button">&#128203; Review Mode</button>
      </div>
      <button class="btn-primary" id="btnStart" type="button">Begin Quiz &#8594;</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="sQuiz" class="screen">
    <div class="quiz-hdr">
      <div class="q-counter">Q <strong id="qNum">1</strong>&nbsp;/&nbsp;<strong id="qTot">220</strong></div>
      <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <div class="timer-chip"><span class="t-dot"></span><span id="timerEl">0:00</span></div>
    </div>
    <div class="qc" id="qContent">
      <div class="q-card">
        <div class="q-num" id="qLabel">Question 1</div>
        <div class="q-text" id="qText"></div>
      </div>
      <div class="opts-list" id="optsList"></div>
      <div class="fb" id="fbBar"><em class="fb-icon" id="fbIcon"></em><span id="fbText"></span></div>
      <div class="cf">
        <button class="btn-next" id="btnNext" type="button">Next Question &#8594;</button>
      </div>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="sResult" class="screen result-wrap">
    <div class="ring-box">
      <svg width="148" height="148" viewBox="0 0 148 148">
        <defs>
          <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0090ff"/>
            <stop offset="100%" stop-color="#00e5b0"/>
          </linearGradient>
        </defs>
        <circle cx="74" cy="74" r="62" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="10"/>
        <circle id="ringPath" cx="74" cy="74" r="62" fill="none"
          stroke="url(#rg)" stroke-width="10" stroke-linecap="round"
          stroke-dasharray="389.56" stroke-dashoffset="389.56"
          transform="rotate(-90 74 74)"
          style="-webkit-transition:stroke-dashoffset 1.1s ease;transition:stroke-dashoffset 1.1s ease;"/>
      </svg>
      <div class="pct-overlay">
        <div class="pct-n" id="resPct"></div>
        <div class="pct-s">Score</div>
      </div>
    </div>
    <div class="res-title" id="resTitle"></div>
    <div class="res-sub" id="resSub"></div>
    <div class="res-grid">
      <div class="res-card"><div class="res-val" id="resC" style="color:var(--accent)"></div><div class="res-lbl">Correct</div></div>
      <div class="res-card"><div class="res-val" id="resW" style="color:var(--danger)"></div><div class="res-lbl">Incorrect</div></div>
      <div class="res-card"><div class="res-val" id="resT" style="color:var(--accent2)"></div><div class="res-lbl">Time Spent</div></div>
    </div>
    <div class="res-actions">
      <button class="btn-outline" id="btnTryAgain" type="button">&#8617; Try Again</button>
      <button class="btn-primary" id="btnNewSession" type="button">New Session &#8594;</button>
    </div>
  </div>

</div>
<script>
var QS=[
{q:"From which drug formulation will absorption in the GI tract be quicker?",o:["Solution","Suspension","Tablets","Capsule","Dragee"],a:0},
{q:"What is typical for injectable administration?",o:["Quicker development of effect than oral administration","Can be given to unconscious patients","Can use drugs destroyed in the stomach","Drugs must be sterile","All of the above"],a:4},
{q:"The most rapid development of effect occurs with which route of administration?",o:["Subcutaneously","Intramuscular","Intravenously","Oral","Sublingual"],a:2},
{q:"What does clearance characterize?",o:["Rate of absorption","Completeness of absorption","Character of distribution","Concentration of active form in blood","Rate of elimination"],a:4},
{q:"Indicate a parenteral way of administration:",o:["Oral","Sublingual","Rectal","Inhalational","In stomach by tube"],a:3},
{q:"What is typical for inhalational administration?",o:["Slow development of effect","Quick development of effect","Can administer irritating substances","Drug must be sterilized","Possibility of gases administration"],a:4},
{q:"What is typical for rectal administration?",o:["Quick development of effect","Necessity to stick to diet","Drug must be sterile","Drug enters circulation without hepatic metabolization","Only suppositories can be administered"],a:3},
{q:"Everything listed belongs to mechanisms of drug transport EXCEPT:",o:["Water diffusion","Water hydrolysis","Lipid diffusion","Pinocytosis and endocytosis","Translocation with special transporters"],a:1},
{q:"Termination of drug action means that:",o:["Drug should be excreted from the body","Metabolism always increases water solubility","Metabolism always removes pharmacological activity","Hepatic metabolization and renal excretion are the two main mechanisms","Distribution in extravasal space always terminates action"],a:0},
{q:"What does half-life time characterize?",o:["Rate of absorption","Character of distribution","Intensity of metabolization","Rate of elimination","Binding to plasma proteins"],a:3},
{q:"What does 'pharmacokinetics' include?",o:["Absorption of drugs","Types of drug action","Mechanisms of primary pharmacological reactions","Pharmacological effects","Side effects"],a:0},
{q:"Conjugation of drugs with glucuronic acid:",o:["Decreases water solubility","Usually leads to inactivation of drugs","Is an example of first phase metabolization","Is the main way of metabolization in newborns","Is catalyzed by cytochrome P450"],a:1},
{q:"Drugs with zero-order kinetics are characterized by:",o:["Comprising most drugs","Decreasing blood concentration by exponent","Half-life independent from dose","Linear concentration-time curve","Elimination of constant drug amount per time unit"],a:4},
{q:"Which notion is correct?",o:["IV drugs have first-order elimination","Inhalational route has very slow absorption","Passive diffusion requires transport proteins","Bioavailability of IV drugs is 100%","High distribution volume indicates quick metabolization"],a:3},
{q:"Steady-state is 10 mg/l, half-life is 2 hours. When will concentration reach 1.25 mg/l after stopping?",o:["1 hour","2 hours","3 hours","4 hours","6 hours"],a:4},
{q:"During continuous IV infusion, time needed to reach steady-state concentration:",o:["4 half-life periods","3 half-life periods","2 half-life periods","1 half-life period","Twice the infusion time"],a:0},
{q:"After IV administration of 100 mg, blood concentration is 10 mg/l. What is the distribution volume?",o:["10 liters","0.1 liter","90 liters","110 liters","1000 liters"],a:0},
{q:"The following are all first phase metabolization reactions EXCEPT:",o:["Hydrolysis","Oxidation","Reduction","Demethylation","Acetylation"],a:4},
{q:"The following are all second phase metabolization reactions EXCEPT:",o:["Methylation","Acetylation","Sulfatation","Conjugation with glycine","N-oxidation"],a:4},
{q:"Which particularities of children should be considered during drug dosing?",o:["More rapid absorption","BBB permeability is higher than in adults","Microsomal enzyme activity is lower than in adults","Glomerular filtration rate is lower than in adults","All listed above"],a:4},
{q:"What is the name for drug accumulation in the body under repeated administrations?",o:["Idiosyncrasy","Sensibilization","Summation","Material cumulation","Functional cumulation"],a:3},
{q:"Which phenomenon can occur during concomitant drug administration?",o:["Idiosyncrasy","Functional cumulation","Tolerance","Material cumulation","Synergism"],a:4},
{q:"What is the term for drug action during pregnancy leading to inherited abnormalities?",o:["Mutagenic","Cancerogenic","Teratogenic","Embryotoxic","Fetotoxic"],a:2},
{q:"What does 'pharmacodynamics' include?",o:["Absorption of drugs","Metabolism of drugs","Drug distribution","Drug excretion","Mechanisms of primary pharmacological reactions"],a:4},
{q:"Increasing of action of one drug under the influence of another is called:",o:["Antagonism","Idiosyncrasy","Cumulation","Synergism","Tolerance"],a:3},
{q:"Tachyphylaxis means:",o:["Cumulation of drug in the body","Strengthening of drug action during concomitant use","Weakening of drug action during concomitant use","Quick weakening of drug effect under repeated administration","Drug dependence"],a:3},
{q:"Most drug receptors are:",o:["Small molecules with weight 100-1000 dalton","Lipids in the bilipid layer","Proteins in cell membranes and cytosol","DNA","RNA"],a:2},
{q:"As second messengers all the following can serve EXCEPT:",o:["cAMP","Inositol-1,4,5-triphosphate","cGMP","Prostaglandin PGE2","Calcium ions"],a:3},
{q:"Amount of drug for a single intake is called:",o:["Course dose","Single dose","Daily dose","Toxic dose","Lethal dose"],a:1},
{q:"Drug used for treatment of acute poisoning with M-cholinomimetics:",o:["Atropine","Dipiroxim","Unithiol","Physostigmine","Niketamide"],a:0},

var L=['A','B','C','D','E'];
var shuffleOn=true,reviewOn=false;
var questions=[],idx=0,score=0,wrong=0,answered=false;
var startTime=null,timerInt=null,elapsed=0;

function ge(id){return document.getElementById(id);}
function cls(id){return document.getElementById(id).className;}

function shufl(a){
  var arr=a.slice(),i=arr.length,j,t;
  while(i--){j=Math.floor(Math.random()*(i+1));t=arr[i];arr[i]=arr[j];arr[j]=t;}
  return arr;
}
function fmt(s){var m=Math.floor(s/60),sc=s%60;return m+':'+(sc<10?'0':'')+sc;}

function showScreen(id){
  var ids=['sStart','sQuiz','sResult'],i;
  for(i=0;i<ids.length;i++) ge(ids[i]).className='screen';
  ge(id).className='screen active';
}

function addEv(id,fn){
  var el=ge(id);
  el.addEventListener('click',fn,false);
  el.addEventListener('touchend',function(e){e.preventDefault();fn(e);},false);
}

addEv('btnShuffle',function(){
  shuffleOn=!shuffleOn;
  ge('btnShuffle').className='tog'+(shuffleOn?' on':'');
});
addEv('btnReview',function(){
  reviewOn=!reviewOn;
  ge('btnReview').className='tog'+(reviewOn?' on':'');
});
addEv('btnStart',startQuiz);
addEv('btnNext',nextQ);
addEv('btnTryAgain',startQuiz);
addEv('btnNewSession',function(){showScreen('sStart');});

function startQuiz(){
  questions=shuffleOn?shufl(QS):QS.slice();
  idx=0;score=0;wrong=0;answered=false;elapsed=0;
  ge('qTot').textContent=questions.length;
  showScreen('sQuiz');
  if(timerInt)clearInterval(timerInt);
  startTime=Date.now();
  timerInt=setInterval(function(){
    elapsed=Math.floor((Date.now()-startTime)/1000);
    ge('timerEl').textContent=fmt(elapsed);
  },1000);
  renderQ();
}

function renderQ(){
  var q=questions[idx];
  answered=false;
  ge('qNum').textContent=idx+1;
  ge('qLabel').textContent='Question '+(idx+1);
  ge('progFill').style.width=((idx/questions.length)*100)+'%';
  ge('qText').textContent=q.q;

  var list=ge('optsList');
  list.innerHTML='';
  var i;
  for(i=0;i<q.o.length;i++){
    (function(i){
      var btn=document.createElement('button');
      btn.type='button';
      btn.className='opt';
      var ltr=document.createElement('span');
      ltr.className='opt-ltr';
      ltr.textContent=L[i];
      var txt=document.createElement('span');
      txt.textContent=q.o[i];
      btn.appendChild(ltr);
      btn.appendChild(txt);
      if(reviewOn){
        btn.disabled=true;
        if(i===q.a) btn.className='opt correct';
      } else {
        btn.addEventListener('click',function(){pick(i);},false);
        btn.addEventListener('touchend',function(e){e.preventDefault();pick(i);},false);
      }
      list.appendChild(btn);
    })(i);
  }

  ge('fbBar').className='fb';
  ge('btnNext').className='btn-next';

  if(reviewOn){
    ge('btnNext').className='btn-next show';
    ge('btnNext').textContent=idx>=questions.length-1?'See Results':'Next Question \u2192';
    showFb(true,'Review mode \u2014 correct answer highlighted.');
    answered=true;
  }
}

function pick(chosen){
  if(answered)return;
  answered=true;
  var q=questions[idx];
  var c=q.a;
  var btns=ge('optsList').querySelectorAll('.opt');
  var i;
  for(i=0;i<btns.length;i++) btns[i].disabled=true;
  if(chosen===c){
    btns[chosen].className='opt correct';
    score++;
    showFb(true,'Correct! Well done.');
  } else {
    btns[chosen].className='opt wrong';
    btns[c].className='opt correct';
    for(i=0;i<btns.length;i++){if(i!==chosen&&i!==c) btns[i].className='opt dim';}
    wrong++;
    showFb(false,'Incorrect. Correct: '+L[c]+'. '+q.o[c]);
  }
  var nb=ge('btnNext');
  nb.className='btn-next show';
  nb.textContent=idx>=questions.length-1?'See Results':'Next Question \u2192';
}

function showFb(ok,msg){
  var fb=ge('fbBar');
  fb.className='fb show '+(ok?'ok':'ko');
  ge('fbIcon').textContent=ok?'\u2713':'\u2717';
  ge('fbText').textContent=msg;
}

function nextQ(){
  if(idx>=questions.length-1){showResults();return;}
  idx++;
  var c=ge('qContent');
  c.className='qc out';
  setTimeout(function(){c.className='qc';renderQ();},160);
}

function showResults(){
  clearInterval(timerInt);
  var tot=questions.length;
  var pct=Math.round((score/tot)*100);
  var circ=2*Math.PI*62;
  var offset=circ-(pct/100)*circ;
  setTimeout(function(){ge('ringPath').style.strokeDashoffset=offset;},100);
  ge('resPct').textContent=pct+'%';
  var grades=[
    [90,'Outstanding! \uD83C\uDFC6','Exceptional pharmacology knowledge.'],
    [75,'Great Work! \uD83C\uDFAF','Strong performance across topics.'],
    [60,'Good Effort! \uD83D\uDCDA','Keep reviewing the tricky areas.'],
    [40,'Keep Practicing! \uD83D\uDCAA','More sessions will improve your score.'],
    [0,'Keep Going! \uD83D\uDD04','Review the material and try again.']
  ];
  var i;
  for(i=0;i<grades.length;i++){
    if(pct>=grades[i][0]){
      ge('resTitle').textContent=grades[i][1];
      ge('resSub').textContent=grades[i][2];
      break;
    }
  }
  ge('resC').textContent=score;
  ge('resW').textContent=wrong;
  ge('resT').textContent=fmt(elapsed);
  showScreen('sResult');
}

ge('totalN').textContent=QS.length;
</script>
</body>
