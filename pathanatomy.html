<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pathological Anatomy Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0508;--surface:#130a0e;--surface2:#1c0f14;
  --border:rgba(255,255,255,0.07);--accent:#e8325a;--accent2:#ff8c42;
  --danger:#ff4d6d;--text:#f0e8ea;--muted:#8a6a70;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',Helvetica,Arial,sans-serif;
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 15% 5%,rgba(232,50,90,.07) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 95%,rgba(255,140,66,.05) 0%,transparent 55%);
}
.wrapper{
  position:relative;z-index:1;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:24px 16px;padding-bottom:calc(24px + env(safe-area-inset-bottom));
}
.screen{display:none;width:100%;max-width:720px;}
.screen.active{display:block;animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pop{0%,100%{transform:scale(1)}40%{transform:scale(1.015)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.start-hero{text-align:center;padding:52px 20px 48px;}
.pill{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(232,50,90,.09);border:1px solid rgba(232,50,90,.25);
  color:var(--accent);font-size:11px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  padding:6px 16px;border-radius:100px;margin-bottom:26px;
}
.pill-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 2s infinite;display:inline-block;}
h1{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(2rem,7vw,3.4rem);font-weight:900;line-height:1.05;
  letter-spacing:-.02em;margin-bottom:14px;
  background:linear-gradient(135deg,#fff 30%,rgba(232,50,90,.85));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;color:#fff;
}
.start-p{color:var(--muted);font-size:.98rem;line-height:1.65;max-width:450px;margin:0 auto 34px;}
.stats-row{display:flex;justify-content:center;gap:10px;margin-bottom:32px;flex-wrap:wrap;}
.stat-chip{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px 20px;text-align:center;min-width:110px;
}
.stat-val{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--accent);line-height:1;}
.stat-lbl{font-size:.68rem;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-top:4px;}
.tog-row{display:flex;justify-content:center;gap:10px;margin-bottom:28px;flex-wrap:wrap;}
.tog{
  background:var(--surface);border:1px solid var(--border);color:var(--muted);
  font-family:'DM Sans',Helvetica,sans-serif;font-size:.85rem;padding:11px 18px;
  border-radius:100px;cursor:pointer;appearance:none;min-height:44px;min-width:44px;
  transition:background .2s,border-color .2s,color .2s;font-weight:500;
}
.tog.on{background:rgba(232,50,90,.1);border-color:rgba(232,50,90,.35);color:var(--accent);}
.btn-primary{
  background:var(--accent);color:#fff;font-family:'Playfair Display',serif;font-weight:700;
  font-size:1rem;letter-spacing:.03em;padding:16px 42px;border-radius:100px;
  border:none;cursor:pointer;appearance:none;min-height:54px;min-width:160px;
  transition:transform .2s,box-shadow .2s;display:inline-block;
}
.btn-primary:active{transform:scale(.97);}

.quiz-hdr{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.q-counter{font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;color:var(--muted);white-space:nowrap;}
.q-counter strong{color:var(--text);}
.prog-wrap{flex:1;height:4px;background:var(--surface2);border-radius:100px;overflow:hidden;}
.prog-fill{
  height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));
  border-radius:100px;transition:width .5s cubic-bezier(.22,1,.36,1);
}
.timer-chip{display:flex;align-items:center;gap:6px;font-size:.8rem;font-weight:600;color:var(--muted);white-space:nowrap;}
.t-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;animation:blink 1.5s infinite;}
.q-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:26px 22px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.q-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent2),var(--accent));
}
.q-num{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.q-text{font-size:1.02rem;line-height:1.65;color:var(--text);}
.opts-list{display:flex;flex-direction:column;gap:9px;}
.opt{
  background:var(--surface2);border:1.5px solid var(--border);border-radius:14px;
  padding:13px 16px;text-align:left;cursor:pointer;display:flex;
  align-items:flex-start;gap:12px;transition:border-color .18s,background .18s;
  font-family:'DM Sans',sans-serif;font-size:.9rem;line-height:1.5;
  color:var(--text);width:100%;appearance:none;min-height:50px;
}
.opt:not(:disabled):hover{border-color:rgba(232,50,90,.35);background:rgba(232,50,90,.04);}
.opt-ltr{
  flex-shrink:0;width:26px;height:26px;border-radius:7px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:700;color:var(--muted);margin-top:1px;
  transition:background .18s,border-color .18s,color .18s;
}
.opt:disabled{cursor:default;}
.opt.correct{border-color:rgba(0,220,130,.6);background:rgba(0,220,130,.08);animation:pop .35s ease;}
.opt.correct .opt-ltr{background:rgba(0,220,130,.2);border-color:#00dc82;color:#00dc82;}
.opt.wrong{border-color:rgba(255,77,109,.5);background:rgba(255,77,109,.06);animation:shake .35s ease;}
.opt.wrong .opt-ltr{background:rgba(255,77,109,.15);border-color:var(--danger);color:var(--danger);}
.opt.dim{opacity:.3;}
.fb{
  border-radius:12px;padding:12px 16px;font-size:.87rem;font-weight:500;margin-bottom:12px;
  display:none;align-items:flex-start;gap:10px;animation:fadeUp .3s ease both;
}
.fb.show{display:flex;}
.fb.ok{background:rgba(0,220,130,.1);border:1px solid rgba(0,220,130,.25);color:#00dc82;}
.fb.ko{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.25);color:#ff8fa3;}
.fb-icon{font-weight:700;flex-shrink:0;font-style:normal;}
.btn-next{
  background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;
  font-family:'Playfair Display',serif;font-weight:700;font-size:.87rem;
  letter-spacing:.04em;padding:14px 30px;border-radius:100px;border:none;
  cursor:pointer;display:none;float:right;margin-top:6px;
  appearance:none;min-height:48px;transition:transform .2s,box-shadow .2s;
}
.btn-next.show{display:inline-block;animation:fadeUp .3s ease both;}
.btn-next:active{transform:scale(.97);}
.cf::after{content:'';display:table;clear:both;}
.qc{transition:opacity .16s ease;}.qc.out{opacity:0;}

.result-wrap{text-align:center;padding:12px 0;}
.ring-box{position:relative;display:inline-block;margin-bottom:0;}
.ring-box svg{display:block;}
.pct-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.pct-n{font-family:'Playfair Display',serif;font-size:2.3rem;font-weight:900;line-height:1;color:var(--text);}
.pct-s{font-size:.68rem;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-top:2px;}
.res-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;margin:18px 0 6px;letter-spacing:-.01em;}
.res-sub{color:var(--muted);font-size:.9rem;margin-bottom:28px;}
.res-grid{display:flex;gap:10px;margin-bottom:28px;justify-content:center;}
.res-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:18px 12px;text-align:center;flex:1;min-width:90px;
}
.res-val{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;line-height:1;}
.res-lbl{font-size:.68rem;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-top:4px;}
.res-val.g{color:#00dc82;}.res-val.r{color:var(--danger);}.res-val.b{color:var(--accent2);}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-sec{
  background:var(--surface);border:1px solid var(--border);color:var(--muted);
  font-family:'DM Sans',sans-serif;font-weight:500;font-size:.9rem;
  padding:13px 28px;border-radius:100px;cursor:pointer;appearance:none;
  min-height:48px;transition:border-color .2s,color .2s;
}
.btn-sec:hover{border-color:rgba(232,50,90,.3);color:var(--text);}

@media(max-width:480px){
  .start-hero{padding:36px 12px 32px;}
  h1{font-size:2rem;}
  .q-card{padding:20px 16px;}
  .opt{padding:11px 13px;font-size:.87rem;}
  .res-grid{gap:7px;}
  .res-val{font-size:1.5rem;}
  .btn-row{flex-direction:column;align-items:stretch;}
  .btn-primary,.btn-sec{width:100%;text-align:center;}
}
</style>
</head>
<body>
<div class="wrapper">

<!-- START -->
<div id="sStart" class="screen active">
  <div class="start-hero">
    <div class="pill"><span class="pill-dot"></span>Medical Education</div>
    <h1>Pathological<br>Anatomy</h1>
    <p class="start-p">Test your knowledge of disease morphology, tissue pathology, and organ pathology across 150 exam-level questions.</p>
    <div class="stats-row">
      <div class="stat-chip"><div class="stat-val" id="totalN">150</div><div class="stat-lbl">Questions</div></div>
      <div class="stat-chip"><div class="stat-val">5</div><div class="stat-lbl">Options</div></div>
      <div class="stat-chip"><div class="stat-val">∞</div><div class="stat-lbl">Attempts</div></div>
    </div>
    <div class="tog-row">
      <button class="tog on" id="btnShuffle">🔀 Shuffle</button>
      <button class="tog" id="btnReview">👁 Review Mode</button>
    </div>
    <button class="btn-primary" id="btnStart">Begin Quiz →</button>
  </div>
</div>

<!-- QUIZ -->
<div id="sQuiz" class="screen">
  <div class="quiz-hdr">
    <span class="q-counter">Q <strong id="qNum">1</strong> / <span id="qTot">150</span></span>
    <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="timer-chip"><span class="t-dot"></span><span id="timerEl">0:00</span></div>
  </div>
  <div class="qc" id="qContent">
    <div class="q-card">
      <div class="q-num" id="qLabel">Question 1</div>
      <div class="q-text" id="qText"></div>
    </div>
    <div class="opts-list" id="optsList"></div>
    <div class="fb" id="fbBar"><i class="fb-icon" id="fbIcon"></i><span id="fbText"></span></div>
    <div class="cf"><button class="btn-next" id="btnNext">Next →</button></div>
  </div>
</div>

<!-- RESULTS -->
<div id="sResult" class="screen">
  <div class="result-wrap">
    <div class="ring-box">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="62" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="12"/>
        <circle id="ringPath" cx="80" cy="80" r="62" fill="none" stroke="url(#rg)" stroke-width="12"
          stroke-linecap="round" stroke-dasharray="389.6" stroke-dashoffset="389.6"
          transform="rotate(-90 80 80)" style="transition:stroke-dashoffset 1s cubic-bezier(.22,1,.36,1)"/>
        <defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#ff8c42"/><stop offset="100%" stop-color="#e8325a"/>
        </linearGradient></defs>
      </svg>
      <div class="pct-overlay"><div class="pct-n" id="resPct">0%</div><div class="pct-s">Score</div></div>
    </div>
    <div class="res-title" id="resTitle">Results</div>
    <div class="res-sub" id="resSub"></div>
    <div class="res-grid">
      <div class="res-card"><div class="res-val g" id="resC">0</div><div class="res-lbl">Correct</div></div>
      <div class="res-card"><div class="res-val r" id="resW">0</div><div class="res-lbl">Wrong</div></div>
      <div class="res-card"><div class="res-val b" id="resT">0:00</div><div class="res-lbl">Time</div></div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" id="btnTryAgain">Try Again</button>
      <button class="btn-sec" id="btnNewSession">← Menu</button>
    </div>
  </div>
</div>

</div>
<script>
var QS=[
{q:"Injury to the liver associated with an influx of acute or chronic inflammatory cells is termed as:",o:["Liver regeneration","Hepatitis","Hepatoma","Liver cirrhosis","Liver degeneration"],a:1},
{q:"Metastasis to the following tissues occur early in prostatic carcinoma:",o:["Obturator lymph node","Brain","Lungs","Bone marrow","Vertebrae"],a:3},
{q:"Conditions leading to endometrial hyperplasia include all of the following, EXCEPT:",o:["Excessive ovarian cortical function","Prolonged administration of estrogenic substances","Polycystic ovarian disease","Functioning granulosa cell tumors of the ovary","Prolonged administration of analgesic substances"],a:4},
{q:"Cells of the immune system which have numerous fine dendritic cytoplasmic processes are called:",o:["CD4+ T-cells","Dendritic cells","Fibroblasts","Leucocytes","Macrophages"],a:1},
{q:"What 'second' disease as a complication of rheumatoid arthritis developed in patient?",o:["Chronic pyelonephritis","Chronic glomerulonephritis","Interstitial nephritis","Secondary shrinkage of kidney","Kidney amyloidosis"],a:4},
{q:"Pathologic hypertrophy may take place at:",o:["Lungs","Spleen","Gallbladder","Heart","Brain"],a:3},
{q:"Abscess of the lung is an example of the following type of inflammation:",o:["Fibrinous","Catarrhal","Purulent","Granulomatous","Serous"],a:2},
{q:"Scarlet fever is most common in age:",o:["35-50 years","3-15 years","1-2 years","20-25 years","50-70 years"],a:1},
{q:"Blood vessels affected in atherosclerosis:",o:["Large veins","Aorta and large arteries","Aorta only","Aorta and arterioles","Large arteries and large veins"],a:1},
{q:"Cardinal signs of acute inflammation include all of the following, EXCEPT:",o:["Redness","Pallor","Pain","Swelling","Local heat"],a:1},
{q:"Pulmonary emboli may originate from all of the following sites, EXCEPT:",o:["Pelvic veins","Portal vein","Deep leg veins","Inferior vena cava","Right atrial appendage"],a:1},
{q:"Jaundice occurs in all of the following pathologic processes, EXCEPT:",o:["Reduced hepatocyte uptake","Impaired conjugation of bilirubin","Excessive production of bilirubin","Impaired bile flow","Increased hepatocellular excretion"],a:4},
{q:"Lipofuscin granules in cells are seen in:",o:["Necrosis","Atrophy from pressure","Denervation atrophy","Brown atrophy","Atrophy from diminished blood supply"],a:3},
{q:"The secondary mediators released during Type I hypersensitivity (anaphylactic type) are all of the following, EXCEPT:",o:["Platelet-activating factor","Cytokines","Biogenic amines","Prostaglandin D2","Leukotrienes"],a:2},
{q:"'Hairy heart' is an example of the following type of inflammation:",o:["Fibrinous","Catarrhal","Purulent","Hemorrhagic","Serous"],a:0},
{q:"In Paget's disease the tumor extends from the following:",o:["Connective tissue of the breast","Areola","Fat tissue of the breast","Axillary lymph nodes","Large ducts"],a:4},
{q:"Sarcoidosis development is associated with:",o:["Unknown","Treponema pallidum","Gram-negative bacilli","Mycobacterium tuberculosis","Mycobacterium leprae"],a:0},
{q:"The lung carcinoma growth is characterized by all of the following, EXCEPT:",o:["Tumor cavitation","Invasion into the bronchial lumen","Peribronchial infiltration","Tuberculoma formation","Penetration into the bronchial wall"],a:3},
{q:"The most common causative organism for lobar pneumonia is:",o:["Hemophilus","All of the above","Streptococci","Pneumococci","Staphylococci"],a:3},
{q:"All of these cells can be found in chronic inflammation infiltrate, EXCEPT:",o:["Platelets","Lymphocytes","Macrophages","Eosinophils","Plasma cells"],a:0},
{q:"What are the factors that are most important in the development of atherosclerosis:",o:["Chronic alcoholism","State of immunity","Arterial hypotension","Hyperproteinemia, hypergammaglobulinemia","Hyperlipidemia, arterial hypertension"],a:4},
{q:"The most common source of arterial thromboemboli is:",o:["Aortic aneurysm","Iliac vein","Cardiac thrombi","Aortic atherosclerotic plaques","Pulmonary veins"],a:2},
{q:"Melanin has all of the following features, EXCEPT:",o:["Non-hemoglobin-derived","Formed in melanocytes","Localized endogenous","Formed of ferritin","Black-brown"],a:3},
{q:"The adherence of neutrophils and monocytes to the vascular endothelium prior to movement into the extravascular space is called:",o:["Emigration","Pavementing","Clotting","Diapedesis","Margination"],a:1},
{q:"Endometrial hyperplasia is associated to the following:",o:["High estrogenic stimulation with normal progestational activity","Normal estrogenic stimulation and progestational activity","Normal estrogenic stimulation with increased progestational activity","High estrogenic stimulation with increased progestational activity","High estrogenic stimulation with diminished progestational activity"],a:4},
{q:"The consequences of atherosclerosis are all of the following, EXCEPT:",o:["Cardiomyopathy","Gangrene of lower extremities","Cerebral infarct","Abdominal aortic aneurysm","Myocardial infarction"],a:0},
{q:"Benign epithelial neoplasm producing finger-like projection from epithelial surfaces is referred to as:",o:["Papilloma","Fibroma","Adenoma","Teratoma","Sarcoma"],a:0},
{q:"Fatty change is often seen in all of the following organs, EXCEPT:",o:["Muscles","Heart","Kidney","Lung","Liver"],a:0},
{q:"The term 'dysentery' refers to diarrhea associated with all of the following symptoms, EXCEPT:",o:["Stools containing blood","'Rice-water' stools","Stools containing pus and mucus","Tenesmus","Abdominal cramping"],a:1},
{q:"Active hyperemia is the result of:",o:["Dilatation of arterioles","Venous engorgement","Lymphatic obstruction","Dilatation of lymphatics","Dilatation of capillaries"],a:0},
{q:"Complications of meningococcal infection include:",o:["All of above","Neuritis","Glomerulonephritis","Septicemia","Myocarditis"],a:0},
{q:"Minute (1-2 mm) hemorrhages into skin, mucous membranes or serosal surfaces are called:",o:["Ecchymoses","Purpura","Hemothorax","Petechiae","Hematomas"],a:3},
{q:"Cell type that transforms into morphologically distinct cells capable of immunoglobulin production is:",o:["T-cells","NK-cells","B-cells","Neutrophils","Basophils"],a:2},
{q:"Clinical-morphological variants of the acute form of tonsillitis are all of the following, EXCEPT:",o:["Catarrhal","Adenomatous","Purulent","Fibrinous","Necrotic"],a:1},
{q:"An important factor in cervical oncogenesis:",o:["HPV-infection","Respiratory syncytial virus","Human immunodeficiency virus","Herpes zoster","Herpes simplex"],a:0},
{q:"Fate of primary tuberculosis includes all of the following, EXCEPT:",o:["Growing of primary affect","Hematogenous progression","Healing fibrosis","Reactivation","Suppuration"],a:4},
{q:"Ischemic injury in the central nervous system results in:",o:["Gangrenous necrosis","Caseous necrosis","Liquefactive necrosis","Fat necrosis","Coagulative necrosis"],a:2},
{q:"The type of tissue necrosis associated with renal infarction is:",o:["Gangrenous necrosis","Coagulative necrosis","Enzymatic fat necrosis","Liquefactive necrosis","Caseous necrosis"],a:1},
{q:"The most serious complication of lower extremity thrombophlebitis is:",o:["Intestinal infarction","Pulmonary infarction","Myocardial infarction","Cerebral infarction","Kidney infarction"],a:1},
{q:"White infarct commonly occurs in all organs, EXCEPT:",o:["Lung","Spleen","Brain","Heart","Kidney"],a:0},
{q:"The usual source of pulmonary emboli are:",o:["Thrombi in the vena porta","Thrombi in the left atrial appendage","Thrombi in the uterus arteries","Thrombi in the deep veins of the lower extremities","Thrombi in the veins of upper extremities"],a:3},
{q:"Hemosiderosis is seen in all pathologic processes, EXCEPT:",o:["Impaired use of iron","Hereditary increased absorption of dietary iron","Inflammation","Hemolytic anemias","Malaria"],a:0},
{q:"Red infarct occurs in all of the following pathologic conditions, EXCEPT:",o:["Venous occlusion","Coronary occlusion","Loose tissue","Previously congested with blood tissues","Tissues with dual circulation"],a:1},
{q:"Small (0.3 to 1.0 cm) hemorrhages into skin, mucous membranes or serosal surfaces are called:",o:["Petechiae","Ecchymoses","Hemothorax","Purpura","Hematomas"],a:3},
{q:"A severe and generalized edema with profound subcutaneous tissue swelling is called:",o:["Ascites","Hydrocele","Hydropericardium","Anasarca","Hydrothorax"],a:3},
{q:"All of the following morphologic features characterize the adenocarcinoma cells, EXCEPT:",o:["Variation in size and shape","Enlarged nucleoli","Hyperchromatic nuclei","Hypochromatic nuclei","Atypical mitoses"],a:3},
{q:"Syphilis granuloma is also called as:",o:["Fibroma","Gumma","Hepatoma","Tuberculoma","Leproma"],a:1},
{q:"All of the following diseases result from Type III hypersensitivity (immune complex disorders), EXCEPT:",o:["Glomerulonephritis","Hemolytic anemia","Farmer's lung","Systemic lupus erythematosus","Myocardial infarction"],a:4},
{q:"Measles virus is transmitted by the following:",o:["Respiratory droplets","Food","Feces","Blood","Milk"],a:0},
{q:"Chronic bronchitis is associated with all of the following pathologic changes, EXCEPT:",o:["Hypertrophy of bronchial submucosal glands","Goblet cell metaplasia in bronchioli","Goblet cell hyperplasia in bronchi","Inflammatory infiltration of bronchioli","Inflammatory infiltration of alveolar walls"],a:4},
{q:"Typical tuberculous granuloma is characterized by all of the following, EXCEPT:",o:["Lymphocytes","Area of central necrosis","Epithelioid cells","Langhans-type giant cells","Plasma cells"],a:4},
{q:"Burkitt lymphoma is characterized by:",o:["'Glassy' appearance of the cell","Presence of Reed-Sternberg cells","Presence of foam cells","Infiltration of plasma cells","'Starry sky' appearance"],a:4},
{q:"The most common localization of Hodgkin's lymphoma:",o:["Spleen","Inguinal lymph nodes","Lymph nodes of the abdominal cavity","Bone marrow","Lymph nodes of the neck"],a:4},

var L=['A','B','C','D','E'];
var shuffleOn=true,reviewOn=false;
var questions=[],idx=0,score=0,wrong=0,answered=false;
var startTime=null,timerInt=null,elapsed=0;
function ge(id){return document.getElementById(id);}
function shufl(a){var arr=a.slice(),i=arr.length,j,t;while(i--){j=Math.floor(Math.random()*(i+1));t=arr[i];arr[i]=arr[j];arr[j]=t;}return arr;}
function fmt(s){var m=Math.floor(s/60),sc=s%60;return m+':'+(sc<10?'0':'')+sc;}
function showScreen(id){
  ['sStart','sQuiz','sResult'].forEach(function(s){ge(s).className='screen';});
  ge(id).className='screen active';
}
function addEv(id,fn){
  var el=ge(id);
  el.addEventListener('click',fn,false);
  el.addEventListener('touchend',function(e){e.preventDefault();fn(e);},false);
}
addEv('btnShuffle',function(){shuffleOn=!shuffleOn;ge('btnShuffle').className='tog'+(shuffleOn?' on':'');});
addEv('btnReview',function(){reviewOn=!reviewOn;ge('btnReview').className='tog'+(reviewOn?' on':'');});
addEv('btnStart',startQuiz);
addEv('btnNext',nextQ);
addEv('btnTryAgain',startQuiz);
addEv('btnNewSession',function(){showScreen('sStart');});
function startQuiz(){
  questions=shuffleOn?shufl(QS):QS.slice();
  idx=0;score=0;wrong=0;answered=false;elapsed=0;
  ge('qTot').textContent=questions.length;
  showScreen('sQuiz');
  if(timerInt)clearInterval(timerInt);
  startTime=Date.now();
  timerInt=setInterval(function(){elapsed=Math.floor((Date.now()-startTime)/1000);ge('timerEl').textContent=fmt(elapsed);},1000);
  renderQ();
}
function renderQ(){
  var q=questions[idx];
  answered=false;
  ge('qNum').textContent=idx+1;
  ge('qLabel').textContent='Question '+(idx+1);
  ge('progFill').style.width=((idx/questions.length)*100)+'%';
  ge('qText').textContent=q.q;
  var list=ge('optsList');list.innerHTML='';
  for(var i=0;i<q.o.length;i++){
    (function(i){
      var btn=document.createElement('button');btn.type='button';btn.className='opt';
      var ltr=document.createElement('span');ltr.className='opt-ltr';ltr.textContent=L[i];
      var txt=document.createElement('span');txt.textContent=q.o[i];
      btn.appendChild(ltr);btn.appendChild(txt);
      if(reviewOn){btn.disabled=true;if(i===q.a)btn.className='opt correct';}
      else{btn.addEventListener('click',function(){pick(i);},false);btn.addEventListener('touchend',function(e){e.preventDefault();pick(i);},false);}
      list.appendChild(btn);
    })(i);
  }
  ge('fbBar').className='fb';
  ge('btnNext').className='btn-next';
  if(reviewOn){
    ge('btnNext').className='btn-next show';
    ge('btnNext').textContent=idx>=questions.length-1?'See Results →':'Next →';
    showFb(true,'Review mode — correct answer highlighted.');answered=true;
  }
}
function pick(chosen){
  if(answered)return;answered=true;
  var q=questions[idx],c=q.a;
  var btns=ge('optsList').querySelectorAll('.opt');
  for(var i=0;i<btns.length;i++)btns[i].disabled=true;
  if(chosen===c){btns[chosen].className='opt correct';score++;showFb(true,'Correct! Well done.');}
  else{
    btns[chosen].className='opt wrong';btns[c].className='opt correct';
    for(var i=0;i<btns.length;i++){if(i!==chosen&&i!==c)btns[i].className='opt dim';}
    wrong++;showFb(false,'Incorrect. Correct: '+L[c]+'. '+q.o[c]);
  }
  var nb=ge('btnNext');nb.className='btn-next show';
  nb.textContent=idx>=questions.length-1?'See Results →':'Next →';
}
function showFb(ok,msg){
  var fb=ge('fbBar');fb.className='fb show '+(ok?'ok':'ko');
  ge('fbIcon').textContent=ok?'✓':'✗';ge('fbText').textContent=msg;
}
function nextQ(){
  if(idx>=questions.length-1){showResults();return;}
  idx++;var c=ge('qContent');c.className='qc out';
  setTimeout(function(){c.className='qc';renderQ();},160);
}
function showResults(){
  clearInterval(timerInt);
  var tot=questions.length,pct=Math.round((score/tot)*100);
  var circ=2*Math.PI*62,offset=circ-(pct/100)*circ;
  setTimeout(function(){ge('ringPath').style.strokeDashoffset=offset;},100);
  ge('resPct').textContent=pct+'%';
  var grades=[[90,'Outstanding! 🏆','Exceptional pathological anatomy knowledge.'],[75,'Great Work! 🎯','Strong performance across topics.'],[60,'Good Effort! 📚','Keep reviewing the tricky areas.'],[40,'Keep Practicing! 💪','More sessions will improve your score.'],[0,'Keep Going! 🔄','Review the material and try again.']];
  for(var i=0;i<grades.length;i++){if(pct>=grades[i][0]){ge('resTitle').textContent=grades[i][1];ge('resSub').textContent=grades[i][2];break;}}
  ge('resC').textContent=score;ge('resW').textContent=wrong;ge('resT').textContent=fmt(elapsed);
  showScreen('sResult');
}
ge('totalN').textContent=QS.length;
