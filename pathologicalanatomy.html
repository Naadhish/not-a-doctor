<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pathological Anatomy &amp; General Medicine Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c14;--surface:#0e1420;--surface2:#141c2e;
  --border:rgba(255,255,255,0.07);--accent:#00e5b0;--accent2:#0090ff;
  --danger:#ff4d6d;--text:#e8edf5;--muted:#6b7a99;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',Helvetica,Arial,sans-serif;
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 20% 10%,rgba(0,144,255,.06) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 90%,rgba(0,229,176,.05) 0%,transparent 60%);
}
.wrapper{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:24px 16px;
  padding-bottom:calc(24px + env(safe-area-inset-bottom));
}
.screen{display:none;width:100%;max-width:720px;}
.screen.active{
  display:block;
  animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes pop{0%,100%{transform:scale(1)}40%{transform:scale(1.015)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* START */
.start-hero{text-align:center;padding:52px 20px 48px;}
.pill{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(0,229,176,.08);border:1px solid rgba(0,229,176,.2);
  color:var(--accent);font-size:11px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  padding:6px 16px;border-radius:100px;margin-bottom:26px;
}
.pill-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);
  animation:blink 2s infinite;display:inline-block;}
h1{
  font-family:'Syne',Helvetica,sans-serif;
  font-size:clamp(1.9rem,7vw,3.3rem);
  font-weight:800;line-height:1.05;letter-spacing:-.02em;margin-bottom:14px;
  background:linear-gradient(135deg,#fff 30%,rgba(0,229,176,.8));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;color:#fff;
}
.start-p{color:var(--muted);font-size:.98rem;line-height:1.65;max-width:450px;margin:0 auto 34px;}
.stats-row{
  display:flex;justify-content:center;
  gap:10px;margin-bottom:32px;flex-wrap:wrap;
}
.stat-chip{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px 20px;text-align:center;min-width:110px;
}
.stat-val{font-family:'Syne',Helvetica,sans-serif;font-size:1.7rem;font-weight:700;color:var(--accent);line-height:1;}
.stat-lbl{font-size:.68rem;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-top:4px;}
.tog-row{
  display:flex;justify-content:center;
  gap:10px;margin-bottom:28px;flex-wrap:wrap;
}
.tog{
  background:var(--surface);border:1px solid var(--border);
  color:var(--muted);font-family:'DM Sans',Helvetica,sans-serif;
  font-size:.85rem;padding:11px 18px;border-radius:100px;
  cursor:pointer;appearance:none;
  min-height:44px;min-width:44px;
  transition:background .2s,border-color .2s,color .2s;
  font-weight:500;
}
.tog.on{background:rgba(0,229,176,.1);border-color:rgba(0,229,176,.35);color:var(--accent);}
.btn-primary{
  background:var(--accent);color:#000;
  font-family:'Syne',Helvetica,sans-serif;font-weight:700;font-size:1rem;
  letter-spacing:.03em;padding:16px 42px;border-radius:100px;
  border:none;cursor:pointer;appearance:none;
  min-height:54px;min-width:160px;
  transition:transform .2s,box-shadow .2s;
  display:inline-block;
}
.btn-primary:active{transform:scale(.97);}

/* QUIZ */
.quiz-hdr{
  display:flex;align-items:center;
  gap:12px;margin-bottom:18px;
}
.q-counter{font-family:'Syne',Helvetica,sans-serif;font-size:.8rem;font-weight:600;color:var(--muted);white-space:nowrap;}
.q-counter strong{color:var(--text);}
.prog-wrap{flex:1;height:4px;background:var(--surface2);border-radius:100px;overflow:hidden;}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent2),var(--accent));
  border-radius:100px;
  transition:width .5s cubic-bezier(.22,1,.36,1);
}
.timer-chip{
  display:flex;align-items:center;gap:6px;
  font-family:'Syne',Helvetica,sans-serif;font-size:.8rem;font-weight:600;
  color:var(--muted);white-space:nowrap;
}
.t-dot{
  width:6px;height:6px;border-radius:50%;background:var(--accent);
  display:inline-block;animation:blink 1.5s infinite;
}
.q-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:26px 22px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.q-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent2),var(--accent));
}
.q-num{font-family:'Syne',Helvetica,sans-serif;font-size:.7rem;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.q-text{font-size:1.02rem;line-height:1.65;color:var(--text);}
.opts-list{
  display:flex;flex-direction:column;gap:9px;
}
.opt{
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:14px;padding:13px 16px;
  text-align:left;cursor:pointer;
  display:flex;align-items:flex-start;gap:12px;
  transition:border-color .18s,background .18s;
  font-family:'DM Sans',Helvetica,sans-serif;
  font-size:.9rem;line-height:1.5;color:var(--text);
  width:100%;appearance:none;
  min-height:50px;
}
.opt:hover:not(:disabled){border-color:rgba(0,229,176,.3);background:rgba(0,229,176,.04);}
.opt-ltr{
  flex-shrink:0;
  width:26px;height:26px;border-radius:7px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',Helvetica,sans-serif;
  font-size:.7rem;font-weight:700;color:var(--muted);
  margin-top:1px;
  transition:background .18s,border-color .18s,color .18s;
}
.opt:disabled{cursor:default;}
.opt.correct{
  border-color:rgba(0,229,176,.6);background:rgba(0,229,176,.08);
  animation:pop .35s ease;
}
.opt.correct .opt-ltr{background:rgba(0,229,176,.2);border-color:var(--accent);color:var(--accent);}
.opt.wrong{
  border-color:rgba(255,77,109,.5);background:rgba(255,77,109,.06);
  animation:shake .35s ease;
}
.opt.wrong .opt-ltr{background:rgba(255,77,109,.15);border-color:var(--danger);color:var(--danger);}
.opt.dim{opacity:.3;}
.fb{
  border-radius:12px;padding:12px 16px;font-size:.87rem;font-weight:500;margin-bottom:12px;
  display:none;align-items:flex-start;gap:10px;
  animation:fadeUp .3s ease both;
}
.fb.show{display:flex;}
.fb.ok{background:rgba(0,229,176,.1);border:1px solid rgba(0,229,176,.25);color:var(--accent);}
.fb.ko{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.25);color:#ff8fa3;}
.fb-icon{font-weight:700;flex-shrink:0;font-style:normal;}
.btn-next{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#000;font-family:'Syne',Helvetica,sans-serif;font-weight:700;
  font-size:.87rem;letter-spacing:.04em;
  padding:14px 30px;border-radius:100px;border:none;cursor:pointer;
  display:none;float:right;margin-top:6px;
  appearance:none;min-height:48px;
  transition:transform .2s,box-shadow .2s;
}
.btn-next.show{
  display:inline-block;
  animation:fadeUp .3s ease both;
}
.btn-next:active{transform:scale(.97);}
.cf::after{content:'';display:table;clear:both;}
.qc{transition:opacity .16s ease;}
.qc.out{opacity:0;}

/* RESULTS */
.result-wrap{text-align:center;padding:12px 0;}
.ring-box{position:relative;display:inline-block;margin-bottom:0;}
.ring-box svg{display:block;}
.pct-overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.pct-n{font-family:'Syne',Helvetica,sans-serif;font-size:2.3rem;font-weight:800;line-height:1;color:var(--text);}
.pct-s{font-size:.68rem;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-top:2px;}
.res-title{font-family:'Syne',Helvetica,sans-serif;font-size:1.6rem;font-weight:700;margin:18px 0 6px;letter-spacing:-.01em;}
.res-sub{color:var(--muted);font-size:.9rem;margin-bottom:28px;}
.res-grid{
  display:flex;gap:10px;margin-bottom:28px;
  justify-content:center;
}
.res-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:18px 12px;text-align:center;
  flex:1;min-width:90px;
}
.res-val{font-family:'Syne',Helvetica,sans-serif;font-size:1.8rem;font-weight:700;line-height:1;}
.res-lbl{font-size:.65rem;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-top:5px;}
.res-btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-secondary{
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-family:'Syne',Helvetica,sans-serif;font-weight:700;
  font-size:.87rem;letter-spacing:.03em;
  padding:14px 28px;border-radius:100px;border:1px solid rgba(255,255,255,.1);
  cursor:pointer;appearance:none;min-height:48px;
  transition:background .2s,border-color .2s;
}
.btn-secondary:hover{background:var(--surface2);border-color:rgba(255,255,255,.15);}
</style>
</head>
<body>
<div class="wrapper">

<!-- START -->
<div id="sStart" class="screen active">
  <div class="start-hero">
    <div class="pill"><span class="pill-dot"></span> MCQ Practice</div>
    <h1>Pathological Anatomy &amp; General Medicine</h1>
    <p class="start-p">Exam-style multiple choice questions covering necrosis, inflammation, neoplasia, circulatory disorders, organ pathology and more.</p>
    <div class="stats-row">
      <div class="stat-chip">
        <div class="stat-val" id="totalN">500</div>
        <div class="stat-lbl">Questions</div>
      </div>
      <div class="stat-chip">
        <div class="stat-val">5</div>
        <div class="stat-lbl">Options Each</div>
      </div>
      <div class="stat-chip">
        <div class="stat-val">~60</div>
        <div class="stat-lbl">Min Est.</div>
      </div>
    </div>
    <div class="tog-row">
      <button id="btnShuffle" class="tog on">&#9654; Shuffle Questions</button>
      <button id="btnReview" class="tog">&#128065; Review Mode</button>
    </div>
    <button id="btnStart" class="btn-primary">Start Quiz &#8594;</button>
  </div>
</div>

<!-- QUIZ -->
<div id="sQuiz" class="screen">
  <div class="quiz-hdr">
    <span class="q-counter">Q <strong id="qNum">1</strong> / <span id="qTot">500</span></span>
    <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="timer-chip"><span class="t-dot"></span><span id="timerEl">0:00</span></div>
  </div>
  <div class="qc" id="qContent">
    <div class="q-card">
      <div class="q-num" id="qLabel">Question 1</div>
      <div class="q-text" id="qText"></div>
    </div>
    <div class="opts-list" id="optsList"></div>
    <div class="fb" id="fbBar"><i class="fb-icon" id="fbIcon"></i><span id="fbText"></span></div>
    <div class="cf">
      <button id="btnNext" class="btn-next">Next Question &#8594;</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="sResult" class="screen">
  <div class="result-wrap">
    <div class="ring-box">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="62" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="12"/>
        <circle id="ringPath" cx="80" cy="80" r="62" fill="none"
          stroke="url(#rg)" stroke-width="12"
          stroke-linecap="round"
          stroke-dasharray="389.56"
          stroke-dashoffset="389.56"
          transform="rotate(-90 80 80)"
          style="transition:stroke-dashoffset 1s cubic-bezier(.22,1,.36,1)"/>
        <defs>
          <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="var(--accent2)"/>
            <stop offset="100%" stop-color="var(--accent)"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="pct-overlay">
        <div class="pct-n" id="resPct">0%</div>
        <div class="pct-s">Score</div>
      </div>
    </div>
    <div class="res-title" id="resTitle"></div>
    <div class="res-sub" id="resSub"></div>
    <div class="res-grid">
      <div class="res-card">
        <div class="res-val" style="color:var(--accent)" id="resC">0</div>
        <div class="res-lbl">Correct</div>
      </div>
      <div class="res-card">
        <div class="res-val" style="color:var(--danger)" id="resW">0</div>
        <div class="res-lbl">Wrong</div>
      </div>
      <div class="res-card">
        <div class="res-val" style="color:var(--accent2)" id="resT">0:00</div>
        <div class="res-lbl">Time</div>
      </div>
    </div>
    <div class="res-btn-row">
      <button id="btnTryAgain" class="btn-primary">Try Again</button>
      <button id="btnNewSession" class="btn-secondary">&#8592; Main Menu</button>
    </div>
  </div>
</div>

</div>
<script>
var QS=[
{q:"Coagulative necrosis is characterized by all of the following pathologic features, EXCEPT",o:["Denaturation of cytoplasmic proteins","Karyorrhaxis","Karyopiknosis","Breakdown of cell organelles","Lipid deposition"],a:4},
{q:"Necrotic cells are characterized by all of the following features, EXCEPT",o:["Increased eosinophilia","Hyaline-like droplets in the cytoplasm","Glassy appearance","Lysis of cytoplasm","Fragmentation of cytoplasm"],a:1},
{q:"One of the following changes in cells at apoptosis",o:["Karyolysis","Nuclear pyknosis","Plasmolysis","Breakdown of mitochondrias","Cellular swelling"],a:1},
{q:"One of the following variants of necrosis can be found in tuberculosis",o:["Caseous necrosis","Gangrenous necrosis","Liquefactive necrosis","Fat necrosis","Fibrinoid necrosis"],a:0},
{q:"One of the following variants of necrosis is associated with acute pancreatitis",o:["Coagulative necrosis","Liquefactive necrosis","Caseous necrosis","Gangrenous necrosis","Fat necrosis"],a:4},
{q:"One of the following variants of necrosis can be found in myocardial infarction",o:["Coagulative necrosis","Liquefactive necrosis","Caseous necrosis","Gangrenous necrosis","Fat necrosis"],a:0},
{q:"One of the following variants of necrosis can be found in cerebral infarct",o:["Coagulative necrosis","Liquefactive necrosis","Caseous necrosis","Gangrenous necrosis","Fat necrosis"],a:1},
{q:"Ischemic injury in the central nervous system results in",o:["Liquefactive necrosis","Coagulative necrosis","Caseous necrosis","Gangrenous necrosis","Fat necrosis"],a:0},
{q:"One of the following variants of necrosis can be found in wet gangrene",o:["Coagulative necrosis","Liquefactive necrosis","Caseous necrosis","Gangrenous necrosis","Fat necrosis"],a:1},
{q:"Apoptosis is characterized by all of the following pathologic features, EXCEPT",o:["Nuclear chromatin condensation","Nuclear fragmentation","Cytoplasmic budding","Organelles swelling","Phagocytosis of the apoptotic bodies"],a:3},
{q:"Apoptosis occurs in all of the following events, EXCEPT",o:["Aging","Cell death in tumors","Death of immune cells","Pathologic atrophy","Cell autolysis"],a:4},
{q:"Apoptotic cell is characterized by all of the following electron micrograph features, EXCEPT",o:["Big size of the cell","Small size of the cell","Dense cytoplasm","Normal organelle","Tightly packed organelles"],a:0},
{q:"Apoptotic body is characterized by all of the following, EXCEPT",o:["Eosinophilic cytoplasm","Tightly packed organelles","Presence of nuclear fragments","Absence of nuclear fragments","Protein droplets in cytoplasm"],a:4},
{q:"Borderline inflammation results from",o:["Necrosis","Apoptosis","Lipofuscinosis","All of these","None of these"],a:0},
{q:"The tubular epithelial cells in acute tubular necrosis include all of the following pathologic features, EXCEPT",o:["Karyolysis","Plasmolysis","Plasmorrhaxis","Plasmocoagulation","Mitosis"],a:4},
{q:"All the following features distinguish apoptosis from necrosis, EXCEPT",o:["Absence of inflammation nearby the injured cells","Fragmentation of nuclear chromatin only","Formation of apoptotic bodies","Affection of the separate cells or clusters of cells","Presence of inflammation nearby the injured cells"],a:4},
{q:"The correct definition of autolysis",o:["Changes induced by fixatives used in histopathologic tissue preparation","Tissue degradation by intracellular enzymes","Ischemic necrosis resulting from arterial occlusion by fibrin clots","Ballooning of cell cytoplasm from lipid accumulation","Loss of tissue architecture"],a:1},
{q:"Each type of necrosis is correctly described, EXCEPT",o:["Coagulation — loss of tissue architecture","Liquefaction — enzymatic softening and disruption of devitalized tissue","Caseous-eosinophilic, amorphous appearance","Fibrinoid — deposition of fibrin-like material in arterial walls","Autolysis — tissue degradation by intracellular enzymes"],a:0},
{q:"Each type of necrosis is correctly paired with its most likely site of involvement, EXCEPT",o:["Coagulated necrosis — heart or kidney","Liquefactive necrosis — spleen or lung","Caseous necrosis — granulomatous inflammatory sites","Fibrinoid necrosis — arterial walls","Fat necrosis — pancreas"],a:1},
{q:"Substances that accumulated within parenchymal cells in steatosis",o:["Amyloid","Apoproteins","Lipids","Vitamins","Ketone bodies"],a:2},
{q:"Fatty change is often seen in all of the following organs, EXCEPT",o:["Liver","Heart","Kidney","Muscles","Lung"],a:4},
{q:"The causes of steatosis include all of the following pathologic states, EXCEPT",o:["Obesity","Anoxia","Inflammation","Protein malnutrition","Intoxication"],a:2},
{q:"The causes of fatty liver include all diseases, EXCEPT",o:["Obesity","Alcohol abuse","Diabetes mellitus","Hepatitis virus B","Anoxia"],a:3},
{q:"The stain that used to identify fat is",o:["Hematoxylin and eosin stain","Sudan III stain","Congo red stain","PAS reaction","Metachromatic stain"],a:1},
{q:"The stain that used to identify glycogen is",o:["Hematoxylin and eosin stain","Sudan III stain","Congo red stain","PAS reaction","Metachromatic stain"],a:3},
{q:"The fatty liver has all pathologic features, EXCEPT",o:["Enlarged","Yellow","Red","Soft","Greasy"],a:2},
{q:"Fatty change is seen by light microscopy as",o:["Intracellular granules","Basophilic granules","Extracellular granules","Vacuoles in the cytoplasm around the nucleus","Eosinophilic granules"],a:3},
{q:"The most common cause of fatty change in the heart is",o:["Inflammation","Neoplasia","Hypoxia","Amyloidosis","Autoimmune diseases"],a:2},
{q:"Fatty change in the heart is characterized by",o:["Red heart","Small size of heart","Tiger heart","Solid heart","Goose heart"],a:2},
{q:"Cholesterol or cholesterol esters intracellular accumulation occurs in all of the following processes, EXCEPT",o:["Atherosclerosis","Xanthomas","Apoptosis","Inflammation and necrosis","Cholesterosis"],a:2},
{q:"Cells which can accumulate cholesterol and cholesterol esters in atherosclerotic plaque are",o:["Macrophages and smooth muscle cells","Leucocytes and fibroblasts","Lymphocytes and erythrocytes","Fibroblasts and leucocytes","Erythrocytes and lymphocytes"],a:0},
{q:"The cells that accumulate fat in atherosclerotic plaques are called",o:["Fibroblasts","Epithelial cells","Foam cells","Lymphocytes","Leukocytes"],a:2},
{q:"All of the following mechanisms cause intracellular accumulation, EXCEPT",o:["Abnormal metabolism","Protein mutation","Inflammation","Enzyme deficiency","Ingestion of indigestible materials"],a:2},
{q:"Toxic shock syndrome is marked by",o:["Fever","Hypotension","Desquamating rash","Acute cholangitis and mild jaundice","All of the above"],a:4},
{q:"Ballooning degeneration of hepatocytes is caused by",o:["Accumulation of water and cellular swelling","Retaining of biliary material","Accumulation of iron or copper substances","Accumulation of fat droplets","Accumulation of lipofuscin"],a:0},
{q:"Ballooning degeneration of hepatocytes results from",o:["Viral hepatitis","Alcoholic liver disease","Biliary material accumulation","Obesity","Diabetes mellitus"],a:0},
{q:"All of the following diseases cause nephrotic syndrome, EXCEPT",o:["Lipoid nephrosis","Diabetes mellitus","Amyloidosis","Obesity","Malignant disease"],a:3},
{q:"All of the following features characterize the ballooning degeneration of hepatocytes, EXCEPT",o:["Swollen cells","Edematous appearance","Clumped cytoplasm","Large droplets of fat","Large clear spaces"],a:3},
{q:"Diabetes mellitus is characterized by the accumulation of glycogen in all cells, EXCEPT",o:["Epithelial cells of the proximal tubules","Liver cells","β-cells of the islets of Langerhans","Smooth muscle cells","Heart muscle cells"],a:3},
{q:"The pathological process that can be found in the stroma of the organs in septicemia",o:["Interstitial inflammation","Hyalinosis","Necrosis","Apoptosis","Hyperplasia"],a:0},
{q:"Pyemic abscesses can be found in the following form of sepsis",o:["Septicemia","Septicopyemia","Chronic sepsis","Bacterial endocarditis","Infective nonbacterial thrombotic endocarditis"],a:1},
{q:"The first pyemic metastases in septicopyemia can be found in the following organ",o:["Lymph nodes","Spleen","Lung","Heart","Skin"],a:2},
{q:"Which of the following events is most important in the development of irreversible cell injury?",o:["Cell membrane damage","Increased cell water","Myelin figure accumulation","Loss of ribosomes","Swelling of mitochondria"],a:0},
{q:"All of the following abnormal clinical manifestations are correctly paired with the appropriate compound or pigment deposits, EXCEPT",o:["CCl4 poisoning — fat","Hemolytic anemia — bilirubin","Idiopathic hemosiderosis — hemosiderin","Vitiligo — melanin","Atrophy of hepatic cells — lipofuscin"],a:3},
{q:"Specific stain for iron is called",o:["Hematoxylin and eosin","Sudan III","Prussian blue","Congo red","PAS-reaction"],a:2},
{q:"Hemosiderin has all of the following features, EXCEPT",o:["Hemoglobin-derived","Golden yellow-to-brown","Granular or crystalline","Synthesized by ensyme tyrosinase","Is aggregate of ferritin"],a:3},
{q:"Hemosiderin in the lungs is accumulated in",o:["Leukocytes","Lymphocytes","Macrophages","Fibroblasts"],a:2},
{q:"Causes of death in pulmonary tuberculosis",o:["Pulmonary insufficiency","Pulmonary hemorrhage","Cor pulmonale","Secondary amyloidosis","All of the above"],a:4},

var L=['A','B','C','D','E'];
var shuffleOn=true,reviewOn=false;
var questions=[],idx=0,score=0,wrong=0,answered=false;
var startTime=null,timerInt=null,elapsed=0;

function ge(id){return document.getElementById(id);}

function shufl(a){
  var arr=a.slice(),i=arr.length,j,t;
  while(i--){j=Math.floor(Math.random()*(i+1));t=arr[i];arr[i]=arr[j];arr[j]=t;}
  return arr;
}
function fmt(s){var m=Math.floor(s/60),sc=s%60;return m+':'+(sc<10?'0':'')+sc;}

function showScreen(id){
  var ids=['sStart','sQuiz','sResult'],i;
  for(i=0;i<ids.length;i++) ge(ids[i]).className='screen';
  ge(id).className='screen active';
}

function addEv(id,fn){
  var el=ge(id);
  el.addEventListener('click',fn,false);
  el.addEventListener('touchend',function(e){e.preventDefault();fn(e);},false);
}

addEv('btnShuffle',function(){
  shuffleOn=!shuffleOn;
  ge('btnShuffle').className='tog'+(shuffleOn?' on':'');
});
addEv('btnReview',function(){
  reviewOn=!reviewOn;
  ge('btnReview').className='tog'+(reviewOn?' on':'');
});
addEv('btnStart',startQuiz);
addEv('btnNext',nextQ);
addEv('btnTryAgain',startQuiz);
addEv('btnNewSession',function(){showScreen('sStart');});

function startQuiz(){
  questions=shuffleOn?shufl(QS):QS.slice();
  idx=0;score=0;wrong=0;answered=false;elapsed=0;
  ge('qTot').textContent=questions.length;
  showScreen('sQuiz');
  if(timerInt)clearInterval(timerInt);
  startTime=Date.now();
  timerInt=setInterval(function(){
    elapsed=Math.floor((Date.now()-startTime)/1000);
    ge('timerEl').textContent=fmt(elapsed);
  },1000);
  renderQ();
}

function renderQ(){
  var q=questions[idx];
  answered=false;
  ge('qNum').textContent=idx+1;
  ge('qLabel').textContent='Question '+(idx+1);
  ge('progFill').style.width=((idx/questions.length)*100)+'%';
  ge('qText').textContent=q.q;

  var list=ge('optsList');
  list.innerHTML='';
  var i;
  for(i=0;i<q.o.length;i++){
    (function(i){
      var btn=document.createElement('button');
      btn.type='button';
      btn.className='opt';
      var ltr=document.createElement('span');
      ltr.className='opt-ltr';
      ltr.textContent=L[i];
      var txt=document.createElement('span');
      txt.textContent=q.o[i];
      btn.appendChild(ltr);
      btn.appendChild(txt);
      if(reviewOn){
        btn.disabled=true;
        if(i===q.a) btn.className='opt correct';
      } else {
        btn.addEventListener('click',function(){pick(i);},false);
        btn.addEventListener('touchend',function(e){e.preventDefault();pick(i);},false);
      }
      list.appendChild(btn);
    })(i);
  }

  ge('fbBar').className='fb';
  ge('btnNext').className='btn-next';

  if(reviewOn){
    ge('btnNext').className='btn-next show';
    ge('btnNext').textContent=idx>=questions.length-1?'See Results':'Next Question \u2192';
    showFb(true,'Review mode \u2014 correct answer highlighted.');
    answered=true;
  }
}

function pick(chosen){
  if(answered)return;
  answered=true;
  var q=questions[idx];
  var c=q.a;
  var btns=ge('optsList').querySelectorAll('.opt');
  var i;
  for(i=0;i<btns.length;i++) btns[i].disabled=true;
  if(chosen===c){
    btns[chosen].className='opt correct';
    score++;
    showFb(true,'Correct! Well done.');
  } else {
    btns[chosen].className='opt wrong';
    btns[c].className='opt correct';
    for(i=0;i<btns.length;i++){if(i!==chosen&&i!==c) btns[i].className='opt dim';}
    wrong++;
    showFb(false,'Incorrect. Correct: '+L[c]+'. '+q.o[c]);
  }
  var nb=ge('btnNext');
  nb.className='btn-next show';
  nb.textContent=idx>=questions.length-1?'See Results':'Next Question \u2192';
}

function showFb(ok,msg){
  var fb=ge('fbBar');
  fb.className='fb show '+(ok?'ok':'ko');
  ge('fbIcon').textContent=ok?'\u2713':'\u2717';
  ge('fbText').textContent=msg;
}

function nextQ(){
  if(idx>=questions.length-1){showResults();return;}
  idx++;
  var c=ge('qContent');
  c.className='qc out';
  setTimeout(function(){c.className='qc';renderQ();},160);
}

function showResults(){
  clearInterval(timerInt);
  var tot=questions.length;
  var pct=Math.round((score/tot)*100);
  var circ=2*Math.PI*62;
  var offset=circ-(pct/100)*circ;
  setTimeout(function(){ge('ringPath').style.strokeDashoffset=offset;},100);
  ge('resPct').textContent=pct+'%';
  var grades=[
    [90,'Outstanding! \uD83C\uDFC6','Exceptional pathoanatomy knowledge.'],
    [75,'Great Work! \uD83C\uDFAF','Strong performance across topics.'],
    [60,'Good Effort! \uD83D\uDCDA','Keep reviewing the tricky areas.'],
    [40,'Keep Practicing! \uD83D\uDCAA','More sessions will improve your score.'],
    [0,'Keep Going! \uD83D\uDD04','Review the material and try again.']
  ];
  var i;
  for(i=0;i<grades.length;i++){
    if(pct>=grades[i][0]){
      ge('resTitle').textContent=grades[i][1];
      ge('resSub').textContent=grades[i][2];
      break;
    }
  }
  ge('resC').textContent=score;
  ge('resW').textContent=wrong;
  ge('resT').textContent=fmt(elapsed);
  showScreen('sResult');
}

ge('totalN').textContent=QS.length;
</script>
</body>
