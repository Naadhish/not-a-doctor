<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Not-a-Doctor LMS</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   ░░  TOKENS  ░░
═══════════════════════════════════════════════════════ */
:root{
  --bg:#07090f;
  --s1:#0d1119;         /* sidebar bg          */
  --s2:#111620;         /* card / hover        */
  --s3:#161d2c;         /* active item bg      */
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.12);
  --gold:#c9a84c;
  --gold2:#e8c87a;
  --blue:#3d8bff;
  --green:#28c97a;
  --red:#e8325a;
  --purple:#7c4dff;
  --text:#dde4f0;
  --muted:#5c6a84;
  --muted2:#8896b0;
  --sidebar-w:300px;
  --hdr-h:56px;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}

/* ═══════════════════════════════════════════════════════
   ░░  LAYOUT SHELL  ░░
═══════════════════════════════════════════════════════ */
.app{display:flex;height:100vh;height:100dvh;overflow:hidden;position:relative;}

/* ── overlay (mobile) ── */
.overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:40;backdrop-filter:blur(2px);
  opacity:0;transition:opacity .3s;
}
.overlay.show{display:block;opacity:1;}

/* ═══════════════════════════════════════════════════════
   ░░  SIDEBAR  ░░
═══════════════════════════════════════════════════════ */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--s1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  height:100%;overflow:hidden;
  transition:transform .32s cubic-bezier(.22,1,.36,1);
  z-index:50;position:relative;
}
.sb-head{
  padding:0 18px;height:var(--hdr-h);
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.sb-logo{
  display:flex;align-items:center;gap:10px;text-decoration:none;
}
.sb-logo-mark{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:700;color:#000;letter-spacing:-.02em;flex-shrink:0;
}
.sb-logo-name{font-size:.92rem;font-weight:600;letter-spacing:-.01em;color:var(--text);}
.sb-logo-name span{color:var(--gold);}
.btn-close-sb{
  background:none;border:none;cursor:pointer;color:var(--muted);
  width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  transition:background .18s,color .18s;
}
.btn-close-sb:hover{background:var(--s2);color:var(--text);}
.btn-close-sb svg{width:16px;height:16px;}

.sb-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 0 24px;}
.sb-body::-webkit-scrollbar{width:4px;}
.sb-body::-webkit-scrollbar-track{background:transparent;}
.sb-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

.sb-home-btn{
  display:flex;align-items:center;gap:10px;
  margin:0 12px 4px;padding:9px 12px;border-radius:10px;
  background:none;border:none;cursor:pointer;width:calc(100% - 24px);
  color:var(--muted2);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;
  transition:background .18s,color .18s;text-align:left;
}
.sb-home-btn:hover,.sb-home-btn.active{background:var(--s2);color:var(--text);}
.sb-home-btn svg{width:15px;height:15px;flex-shrink:0;opacity:.7;}

.sb-divider{height:1px;background:var(--border);margin:8px 12px 4px;}

/* ── subject group ── */
.subject-group{margin-bottom:2px;}
.subject-toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 18px 9px 16px;cursor:pointer;
  font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  user-select:none;background:none;border:none;width:100%;
  transition:color .18s;
}
.subject-toggle:hover{color:var(--muted2);}
.subject-toggle .chevron{
  transition:transform .25s;flex-shrink:0;
}
.subject-toggle.open .chevron{transform:rotate(90deg);}
.subject-name{display:flex;align-items:center;gap:8px;}
.subject-dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.5;}

.courses-list{overflow:hidden;transition:max-height .3s cubic-bezier(.22,1,.36,1);}
.courses-list.collapsed{max-height:0!important;}

/* ── course item ── */
.course-item{
  display:flex;align-items:center;gap:0;
  margin:1px 8px;border-radius:10px;
  background:none;border:none;cursor:pointer;width:calc(100% - 16px);
  transition:background .18s;
  overflow:hidden;
}
.course-item:hover{background:var(--s2);}
.course-item.active{background:var(--s3);}
.course-item-inner{
  display:flex;align-items:flex-start;gap:10px;padding:10px 12px;width:100%;
}
.course-icon{
  width:30px;height:30px;border-radius:8px;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;font-size:.8rem;
}
.course-meta{flex:1;text-align:left;min-width:0;}
.course-title{
  font-size:.85rem;font-weight:500;line-height:1.35;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color .18s;
}
.course-item.active .course-title{color:#fff;font-weight:600;}
.course-sub{font-size:.72rem;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px;}
.tag{
  font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:2px 6px;border-radius:4px;
}
.tag-mcq{background:rgba(61,139,255,.15);color:var(--blue);}
.tag-pdf{background:rgba(232,50,90,.15);color:var(--red);}
.tag-video{background:rgba(40,201,122,.15);color:var(--green);}
.tag-notes{background:rgba(124,77,255,.15);color:var(--purple);}

.sb-footer{
  padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;
  font-size:.72rem;color:var(--muted);line-height:1.6;
}
.sb-footer a{color:var(--gold);text-decoration:none;}

/* ═══════════════════════════════════════════════════════
   ░░  MAIN  ░░
═══════════════════════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* ── top bar ── */
.topbar{
  height:var(--hdr-h);flex-shrink:0;
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:0 20px;
}
.btn-menu{
  background:none;border:1px solid var(--border);cursor:pointer;color:var(--muted);
  width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  transition:background .18s,color .18s,border-color .18s;flex-shrink:0;
}
.btn-menu:hover{background:var(--s2);color:var(--text);border-color:var(--border2);}
.btn-menu svg{width:16px;height:16px;}
.topbar-title{flex:1;font-size:.88rem;font-weight:500;color:var(--muted2);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-title strong{color:var(--text);}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.breadcrumb{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:4px;}
.breadcrumb span{color:var(--text);}

/* ── content area ── */
.content-area{flex:1;overflow:hidden;position:relative;}

/* ── landing ── */
.landing{
  height:100%;overflow-y:auto;
  padding:60px 40px;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;
}
.landing::-webkit-scrollbar{width:6px;}
.landing::-webkit-scrollbar-track{background:transparent;}
.landing::-webkit-scrollbar-thumb{background:var(--border2);border-radius:6px;}

.landing-inner{max-width:680px;width:100%;}

.landing-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);
  color:var(--gold);font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:5px 14px;border-radius:100px;margin-bottom:28px;
}
.landing-eyebrow-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulse 2.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

.landing h1{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:clamp(2.2rem,5vw,3.6rem);line-height:1.08;letter-spacing:-.02em;
  margin-bottom:20px;color:#fff;
}
.landing h1 em{font-style:italic;color:var(--gold);}

.landing-lead{
  font-size:1.05rem;line-height:1.75;color:var(--muted2);
  margin-bottom:44px;max-width:540px;
}

/* stats strip */
.stats-strip{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  margin-bottom:44px;
}
.stat-box{
  background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 16px;
}
.stat-box-val{
  font-family:'Instrument Serif',serif;font-size:2rem;line-height:1;
  color:var(--gold);margin-bottom:4px;
}
.stat-box-lbl{font-size:.72rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}

/* course cards on landing */
.landing-section-title{
  font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px;
}
.landing-section-title::after{content:'';flex:1;height:1px;background:var(--border);}

.course-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:36px;}
.course-card{
  background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;cursor:pointer;transition:border-color .2s,background .2s,transform .15s;
  text-align:left;display:flex;flex-direction:column;gap:10px;
}
.course-card:hover{border-color:rgba(201,168,76,.3);background:var(--s2);transform:translateY(-1px);}
.course-card:active{transform:translateY(0);}
.cc-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.cc-title{font-size:.9rem;font-weight:600;color:var(--text);line-height:1.35;}
.cc-meta{display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--muted);}
.cc-subject{font-size:.72rem;color:var(--muted);margin-top:2px;}

/* how-to */
.howto{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:0;}
.howto-title{font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.howto-steps{display:flex;flex-direction:column;gap:9px;}
.howto-step{display:flex;align-items:flex-start;gap:12px;font-size:.82rem;color:var(--muted2);line-height:1.5;}
.step-num{
  width:20px;height:20px;border-radius:50%;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);
  color:var(--gold);font-size:.65rem;font-weight:700;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;margin-top:1px;
}

/* ── iframe view ── */
.frame-wrap{height:100%;display:flex;flex-direction:column;}
.frame-bar{
  height:40px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 14px;
}
.btn-back{
  display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;
  color:var(--muted2);font-size:.78rem;font-weight:500;font-family:'DM Sans',sans-serif;
  padding:5px 10px;border-radius:7px;transition:background .18s,color .18s;
}
.btn-back:hover{background:var(--s2);color:var(--text);}
.btn-back svg{width:13px;height:13px;}
.frame-course-name{font-size:.8rem;color:var(--muted);flex:1;}
.frame-course-name strong{color:var(--text);}
.frame-tag{font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:5px;}
.content-frame{flex:1;border:none;width:100%;background:transparent;}

/* ═══════════════════════════════════════════════════════
   ░░  RESPONSIVE  ░░
═══════════════════════════════════════════════════════ */
@media(min-width:769px){
  .btn-menu{display:none;}
  .btn-close-sb{display:none;}
  .sb-head{justify-content:flex-start;}
  .topbar-title{display:none;}
}
@media(max-width:768px){
  .sidebar{
    position:fixed;left:0;top:0;height:100%;
    transform:translateX(-100%);
  }
  .sidebar.open{transform:translateX(0);}
  .main{width:100%;}
  .landing{padding:32px 20px;}
  .stats-strip{grid-template-columns:1fr 1fr;gap:8px;}
  .stats-strip .stat-box:last-child{grid-column:1/-1;}
  .course-cards{grid-template-columns:1fr;}
  .howto{padding:16px 16px;}
}
@media(max-width:480px){
  .landing h1{font-size:2rem;}
  .stats-strip{grid-template-columns:1fr;}
  .stats-strip .stat-box:last-child{grid-column:auto;}
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
  ██████████  EASY CONFIG — ADD YOUR COURSES HERE  ████
  ═══════════════════════════════════════════════════
  Each object inside COURSES has:
    title   → display name of the subject group
    color   → accent color for the group dot
    items   → array of course objects:
       title    → course name shown in sidebar + cards
       file     → path to the HTML file (same folder = just filename)
       tag      → "MCQ" | "PDF" | "Video" | "Notes"
       icon     → any emoji
       questions → number shown as metadata (optional, put 0 to hide)
  ════════════════════════════════════════════════════ -->
<script>
const SITE = {
  name:     "Empty Page",
  tagline:  "",
  welcome:  "Nothing to see here",
  author:   "Not-a-Doctor"          /* shown in sidebar footer */
};

const COURSES = [
  {
    title: "Pathological Sciences",
    color: "#e8325a",
    items: [
      {
        title:     "Pathological Anatomy",
        file:      "pathanatomy.html",
        tag:       "MCQ",
        icon:      "🔬",
        questions: 140
      },
      {
        title:     "Pathological Physiology",
        file:      "pathophysiology.html",
        tag:       "MCQ",
        icon:      "⚗️",
        questions: 167
      }
    ]
  },
  {
    title: "Pharmacology",
    color: "#3d8bff",
    items: [
      {
        title:     "Pharmacology",
        file:      "pharmacology.html",
        tag:       "MCQ",
        icon:      "💊",
        questions: 220
      }
    ]
  }
  /* ── PASTE NEW SUBJECT BLOCKS BELOW THIS LINE ──────────
  ,{
    title: "Internal Medicine",
    color: "#28c97a",
    items: [
      { title: "Cardiology MCQs", file: "cardiology.html", tag: "MCQ", icon: "🫀", questions: 200 },
      { title: "Respiratory MCQs", file: "respiratory.html", tag: "MCQ", icon: "🫁", questions: 180 }
    ]
  }
  ──────────────────────────────────────────────────────── */
];
</script>

<div class="app">

  <!-- overlay (mobile) -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- ════════ SIDEBAR ════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <a class="sb-logo" href="#" onclick="showHome();return false;">
        <div class="sb-logo-mark" id="logoMark">M</div>
        <div class="sb-logo-name" id="logoName">Loading…</div>
      </a>
      <button class="btn-close-sb" onclick="closeSidebar()" aria-label="Close menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="sb-body" id="sbBody">
      <!-- home button -->
      <button class="sb-home-btn active" id="homeBtn" onclick="showHome()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </button>
      <div class="sb-divider"></div>
      <!-- course groups injected here by JS -->
      <div id="courseGroups"></div>
    </div>

    <div class="sb-footer" id="sbFooter"></div>
  </aside>

  <!-- ════════ MAIN ════════ -->
  <div class="main">

    <!-- top bar -->
    <div class="topbar">
      <button class="btn-menu" onclick="openSidebar()" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title" id="topbarTitle">Home</div>
    </div>

    <!-- content -->
    <div class="content-area" id="contentArea">
      <!-- landing injected here -->
    </div>

  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   BOOT — read COURSES config and build the UI
══════════════════════════════════════════════════════ */
(function(){
  /* set site name */
  document.title = SITE.name + '  LMS';
  document.getElementById('logoName').innerHTML = SITE.name.replace(/(\w+)$/, '<span>$1</span>');
  document.getElementById('logoMark').textContent = SITE.name.charAt(0);
  document.getElementById('sbFooter').innerHTML =
    'Built by <a href="#">' + SITE.author + '</a><br>© ' + new Date().getFullYear() + ' · ' + SITE.tagline;

  /* count totals */
  var totalCourses = 0, totalQ = 0;
  COURSES.forEach(function(g){ g.items.forEach(function(c){ totalCourses++; totalQ += (c.questions||0); }); });
  window._totals = { courses: totalCourses, questions: totalQ, subjects: COURSES.length };

  buildSidebar();
  showHome();
})();

/* ── build sidebar groups ── */
function buildSidebar(){
  var cg = document.getElementById('courseGroups');
  COURSES.forEach(function(group, gi){
    var gDiv = document.createElement('div');
    gDiv.className = 'subject-group';
    gDiv.id = 'group-' + gi;

    /* toggle button */
    var togBtn = document.createElement('button');
    togBtn.className = 'subject-toggle open';
    togBtn.innerHTML =
      '<span class="subject-name">' +
        '<span class="subject-dot" style="background:' + (group.color||'#888') + '"></span>' +
        escH(group.title) +
      '</span>' +
      '<svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>';

    var list = document.createElement('div');
    list.className = 'courses-list';
    list.id = 'cl-' + gi;

    /* set initial max-height */
    var itemH = 62, count = group.items.length;
    list.style.maxHeight = (itemH * count + 8) + 'px';

    togBtn.addEventListener('click', function(){
      var open = togBtn.classList.contains('open');
      if(open){
        list.style.maxHeight = '0';
        list.classList.add('collapsed');
        togBtn.classList.remove('open');
      } else {
        list.classList.remove('collapsed');
        list.style.maxHeight = (itemH * count + 8) + 'px';
        togBtn.classList.add('open');
      }
    });

    gDiv.appendChild(togBtn);

    /* course items */
    group.items.forEach(function(course, ci){
      var btn = document.createElement('button');
      btn.className = 'course-item';
      btn.id = 'ci-' + gi + '-' + ci;
      btn.setAttribute('data-file', course.file);
      btn.setAttribute('data-title', course.title);
      btn.setAttribute('data-tag', course.tag||'MCQ');

      var tagClass = 'tag-' + (course.tag||'MCQ').toLowerCase();
      var iconColor = group.color || '#888';
      var qStr = course.questions > 0 ? course.questions + ' questions' : '';

      btn.innerHTML =
        '<div class="course-item-inner">' +
          '<div class="course-icon" style="background:' + hexAlpha(iconColor, .12) + '">' + (course.icon||'📄') + '</div>' +
          '<div class="course-meta">' +
            '<div class="course-title">' + escH(course.title) + '</div>' +
            '<div class="course-sub">' +
              '<span class="tag ' + tagClass + '">' + escH(course.tag||'MCQ') + '</span>' +
              (qStr ? '<span>' + qStr + '</span>' : '') +
            '</div>' +
          '</div>' +
        '</div>';

      btn.addEventListener('click', function(){ loadCourse(course, gi, ci); });
      list.appendChild(btn);
    });

    gDiv.appendChild(list);
    cg.appendChild(gDiv);
  });
}

/* ── landing page ── */
function showHome(){
  clearActiveItems();
  document.getElementById('homeBtn').classList.add('active');
  document.getElementById('topbarTitle').textContent = 'Home';

  var t = window._totals;
  var cardsHtml = '';
  COURSES.forEach(function(group, gi){
    group.items.forEach(function(course, ci){
      var tagClass = 'tag-' + (course.tag||'MCQ').toLowerCase();
      var iconColor = group.color || '#888';
      cardsHtml +=
        '<button class="course-card" onclick="loadCourseByIndex(' + gi + ',' + ci + ')">' +
          '<div class="cc-icon" style="background:' + hexAlpha(iconColor, .12) + '">' + (course.icon||'📄') + '</div>' +
          '<div>' +
            '<div class="cc-title">' + escH(course.title) + '</div>' +
            '<div class="cc-subject">' + escH(group.title) + '</div>' +
          '</div>' +
          '<div class="cc-meta">' +
            '<span class="tag ' + tagClass + '">' + escH(course.tag||'MCQ') + '</span>' +
            (course.questions > 0 ? '<span>' + course.questions + ' questions</span>' : '') +
          '</div>' +
        '</button>';
    });
  });

  document.getElementById('contentArea').innerHTML =
    '<div class="landing">' +
      '<div class="landing-inner">' +

        '<div class="landing-eyebrow"><span class="landing-eyebrow-dot"></span>' + escH(SITE.tagline) + '</div>' +

        '<h1>Welcome to<br><em>' + escH(SITE.name) + '</em></h1>' +

        '<p class="landing-lead">' + escH(SITE.welcome) + '</p>' +

        '<div class="stats-strip">' +
          '<div class="stat-box"><div class="stat-box-val">' + t.subjects + '</div><div class="stat-box-lbl">Subjects</div></div>' +
          '<div class="stat-box"><div class="stat-box-val">' + t.courses + '</div><div class="stat-box-lbl">Courses</div></div>' +
          '<div class="stat-box"><div class="stat-box-val">' + (t.questions > 999 ? (t.questions/1000).toFixed(1) + 'k' : t.questions) + '</div><div class="stat-box-lbl">Questions</div></div>' +
        '</div>' +

        '<div class="landing-section-title">All Courses</div>' +
        '<div class="course-cards">' + cardsHtml + '</div>' +

      '</div>' +
    '</div>';

  closeSidebar();
}

/* ── load course by index (from landing cards) ── */
function loadCourseByIndex(gi, ci){
  loadCourse(COURSES[gi].items[ci], gi, ci);
}

/* ── load a course into iframe ── */
function loadCourse(course, gi, ci){
  clearActiveItems();
  var btn = document.getElementById('ci-' + gi + '-' + ci);
  if(btn) btn.classList.add('active');
  document.getElementById('homeBtn').classList.remove('active');
  document.getElementById('topbarTitle').innerHTML = '<strong>' + escH(course.title) + '</strong>';

  var tagClass = 'tag-' + (course.tag||'MCQ').toLowerCase();
  document.getElementById('contentArea').innerHTML =
    '<div class="frame-wrap">' +
      '<div class="frame-bar">' +
        '<button class="btn-back" onclick="showHome()">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>' +
          'Back' +
        '</button>' +
        '<div class="frame-course-name"><strong>' + escH(course.title) + '</strong>' +
          (course.questions > 0 ? ' · ' + course.questions + ' questions' : '') +
        '</div>' +
        '<span class="frame-tag ' + tagClass + '">' + escH(course.tag||'MCQ') + '</span>' +
      '</div>' +
      '<iframe class="content-frame" src="' + escH(course.file) + '" title="' + escH(course.title) + '" allowfullscreen></iframe>' +
    '</div>';

  closeSidebar();
}

/* ── sidebar toggle ── */
function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

/* ── helpers ── */
function clearActiveItems(){
  document.querySelectorAll('.course-item.active').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('homeBtn').classList.remove('active');
}
function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hexAlpha(hex, alpha){
  var r=0,g=0,b=0;
  if(hex.length===7){ r=parseInt(hex.slice(1,3),16); g=parseInt(hex.slice(3,5),16); b=parseInt(hex.slice(5,7),16); }
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}
</script>
